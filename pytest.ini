[pytest]
# STAR TEAM — pytest 설정
testpaths = scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Playwright 기본 설정
# --base-url 은 conftest.py 에서 .env BASE_URL 을 읽음
addopts =
    --tb=short
    --browser chromium
    --base-url http://localhost:8080

# 마커 정의
markers =
    smoke: 핵심 기능 빠른 검증 (배포 후 즉시 실행)
    regression: 전체 회귀 테스트
    e2e: 브라우저 E2E 테스트
