server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    charset utf-8;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/markdown;
    gzip_min_length 1024;

    # .md 파일을 fetch()로 읽을 수 있도록 MIME 타입 지정
    location ~* \.md$ {
        add_header Content-Type "text/plain; charset=utf-8";
        try_files $uri =404;
    }

    # / 접속 시 앱으로 리다이렉트 (absolute_redirect off: 상대경로로 응답, 포트 보존)
    absolute_redirect off;
    location = / {
        return 301 /public/index.html;
    }

    # 정적 파일 서빙 (모든 경로)
    location / {
        try_files $uri $uri/ =404;
    }

    # 캐시: 이미지/폰트는 1일, HTML/CSV는 캐시 안 함
    location ~* \.(jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    location ~* \.(html|csv|json)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
